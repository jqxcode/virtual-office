<!DOCTYPE html>
<html lang="en">
<head>
<!-- vo-theme-0.2.0 -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bug Killer Scan - {{TIMESTAMP}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
  :root {
    --vo-bg-deep: #0d1117; --vo-bg-panel: #010409; --vo-bg-surface: #161b22;
    --vo-bg-hover: #1c2128; --vo-bg-recessed: #0a0c10;
    --vo-text-primary: #e6edf3; --vo-text-secondary: #d0d6e0;
    --vo-text-tertiary: #8b949e; --vo-text-quaternary: #484f58;
    --vo-accent: #22c55e; --vo-accent-secondary: #10b981; --vo-accent-hover: #16a34a;
    --vo-border-subtle: rgba(255,255,255,0.05); --vo-border-standard: rgba(255,255,255,0.08);
    --vo-border-solid: #30363d; --vo-border-solid-light: #21262d;
    --vo-status-success: #22c55e; --vo-status-error: #ef4444;
    --vo-status-warning: #f59e0b; --vo-status-info: #3b82f6;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-feature-settings: "cv01", "ss03";
    background: var(--vo-bg-deep); color: var(--vo-text-secondary); line-height: 1.5;
    max-width: 900px; margin: 0 auto; padding: 24px;
  }
  h1 { color: var(--vo-text-primary); font-size: 32px; font-weight: 500; letter-spacing: -0.704px; margin-bottom: 8px; }
  .subtitle { color: var(--vo-text-tertiary); font-size: 15px; font-weight: 400; margin-bottom: 24px; }
  .card { background: var(--vo-bg-surface); border: 1px solid var(--vo-border-standard); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
  .card h2 { color: var(--vo-text-primary); font-size: 18px; font-weight: 500; margin: 0 0 12px 0; border-bottom: 1px solid var(--vo-border-subtle); padding-bottom: 8px; }
  .label { display: inline-block; padding: 2px 10px; border-radius: 9999px; font-size: 12px; font-weight: 500; margin-right: 6px; }
  .label-bug { background: rgba(239,68,68,0.15); color: var(--vo-status-error); }
  .label-enhancement { background: rgba(59,130,246,0.15); color: var(--vo-status-info); }
  .label-unlabeled { background: rgba(139,148,158,0.15); color: var(--vo-text-tertiary); }
  .meta { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 12px; }
  .meta-item { font-size: 14px; color: var(--vo-text-tertiary); }
  .meta-item strong { color: var(--vo-text-primary); }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 9999px; font-size: 12px; font-weight: 500; }
  .badge-success { background: rgba(34,197,94,0.15); color: var(--vo-status-success); }
  .badge-failed { background: rgba(239,68,68,0.15); color: var(--vo-status-error); }
  .badge-skipped { background: rgba(245,158,11,0.15); color: var(--vo-status-warning); }
  .code { font-family: 'Cascadia Code', ui-monospace, monospace; background: var(--vo-bg-recessed); border: 1px solid var(--vo-border-standard); border-radius: 6px; padding: 12px 16px; font-size: 13px; overflow-x: auto; margin: 8px 0; line-height: 1.5; white-space: pre; }
  .code .old { color: var(--vo-status-error); }
  .code .new { color: var(--vo-status-success); }
  a { color: var(--vo-accent); text-decoration: none; }
  a:hover { color: var(--vo-accent-hover); text-decoration: underline; }

  /* Auth hint for jqxcode links */
  .auth-hint { display: inline-block; margin-left: 6px; font-size: 12px; color: var(--vo-status-warning); vertical-align: middle; cursor: help; }
  .gh-open { display: inline-block; margin-left: 4px; padding: 1px 6px; background: var(--vo-bg-recessed); border: 1px solid var(--vo-border-standard); border-radius: 4px; font-size: 12px; color: var(--vo-text-tertiary); cursor: pointer; vertical-align: middle; }
  .gh-open:hover { background: var(--vo-bg-surface); color: var(--vo-accent); }
  .result-bar { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--vo-bg-recessed); border-radius: 8px; border-left: 4px solid var(--vo-status-success); }
  .result-bar.failed { border-left-color: var(--vo-status-error); }
  .result-bar.skipped { border-left-color: var(--vo-status-warning); }
  ul { margin: 8px 0; padding-left: 20px; line-height: 1.8; }
  .section-title { color: var(--vo-text-tertiary); font-size: 13px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; margin: 16px 0 8px 0; }
  .section-title:first-child { margin-top: 0; }

  /* Summary table */
  table { width: 100%; border-collapse: collapse; margin: 16px 0; }
  th { background: var(--vo-bg-panel); color: var(--vo-text-tertiary); font-size: 13px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--vo-border-standard); }
  td { padding: 10px 14px; font-size: 14px; border-bottom: 1px solid var(--vo-border-subtle); color: var(--vo-text-secondary); }
  tr:hover td { background: var(--vo-bg-hover); }

  .footer { margin-top: 32px; padding-top: 16px; border-top: 1px solid var(--vo-border-subtle); color: var(--vo-text-quaternary); font-size: 12px; }
</style>
</head>
<body>

  <h1>Bug Killer Scan Report</h1>
  <p style="color:var(--vo-text-tertiary); font-size:13px; margin-top:-10px;">{{VO_SUBTITLE}}</p>
  <div class="subtitle">{{TIMESTAMP}}</div>

  <!-- ===== SECTION 1: Summary ===== -->
  <div class="card">
    <h2>Summary</h2>
    <table>
      <thead>
        <tr>
          <th>Repo</th>
          <th>Issue</th>
          <th>Labels</th>
          <th>Result</th>
          <th>PR</th>
          <th>Branch</th>
        </tr>
      </thead>
      <tbody>
        {{SUMMARY_TABLE_ROWS}}
      </tbody>
    </table>
  </div>

  <!-- ===== SECTION 2: Issue Details ===== -->
  <!-- Repeat per issue -->
  {{ISSUE_DETAILS}}

  <!-- ===== SECTION 3: Notes (optional) ===== -->
  <!-- Only include this section if there are additional notes -->
  <div class="card">
    <h2>Notes</h2>
    <p>{{NOTES}}</p>
  </div>

<script>
// For private jqxcode repos, add auth hint + "open via gh" button next to GitHub links
(function() {
  var PAT_KEY = 'jqxcode_pat'; // reads from localStorage if set
  document.querySelectorAll('a[href*="github.com/jqxcode/"]').forEach(function(a) {
    // "open via gh" button that copies the gh CLI command
    var btn = document.createElement('span');
    btn.className = 'gh-open';
    btn.title = 'Copy gh CLI command to open this link (uses jqxcode auth)';
    btn.textContent = 'gh open';
    btn.onclick = function(e) {
      e.preventDefault();
      e.stopPropagation();
      var url = a.href;
      // Determine gh command: issue vs PR
      var cmd;
      var m = url.match(/github\.com\/([^/]+\/[^/]+)\/(pull|issues)\/(\d+)/);
      if (m) {
        var repo = m[1], type = m[2], num = m[3];
        cmd = type === 'pull'
          ? 'GH_TOKEN=$(git -C Q:/src/personal_projects/virtual-office remote -v | grep -oP "ghp_[^@]+") gh pr view ' + num + ' --repo ' + repo + ' --web'
          : 'GH_TOKEN=$(git -C Q:/src/personal_projects/virtual-office remote -v | grep -oP "ghp_[^@]+") gh issue view ' + num + ' --repo ' + repo + ' --web';
      } else {
        cmd = 'GH_TOKEN=$(git -C Q:/src/personal_projects/virtual-office remote -v | grep -oP "ghp_[^@]+") gh repo view ' + url.replace('https://github.com/','') + ' --web';
      }
      navigator.clipboard.writeText(cmd).then(function() {
        btn.textContent = 'copied!';
        setTimeout(function() { btn.textContent = 'gh open'; }, 1500);
      });
    };
    a.parentNode.insertBefore(btn, a.nextSibling);
  });
})();
</script>
</body>
</html>
