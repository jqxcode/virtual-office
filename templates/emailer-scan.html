<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gmail Scan Report -- {{TIMESTAMP}}</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0d1117; color: #c9d1d9; padding: 32px; }
  .container { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 600; color: #e6edf3; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #8b949e; margin-bottom: 28px; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px 24px; margin-bottom: 20px; }
  .card h2 { font-size: 15px; font-weight: 600; color: #e6edf3; margin-bottom: 14px; }
  .mailbox-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .mailbox-name { font-size: 15px; font-weight: 600; color: #e6edf3; }
  .mailbox-email { font-size: 12px; color: #8b949e; }
  .badge { display: inline-block; font-size: 12px; font-weight: 600; padding: 2px 8px; border-radius: 12px; }
  .badge-total { background: #1f6feb33; color: #58a6ff; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; font-size: 11px; font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; padding: 6px 0; border-bottom: 1px solid #30363d; }
  td { padding: 8px 0; font-size: 14px; border-bottom: 1px solid #21262d; }
  td:last-child { text-align: right; font-variant-numeric: tabular-nums; }
  .cat-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; vertical-align: middle; }
  .dot-delete { background: #f85149; }
  .dot-review { background: #d29922; }
  .dot-keep { background: #3fb950; }
  .dot-rollup { background: #58a6ff; }
  .actions { margin-top: 16px; }
  .actions table td { color: #8b949e; }
  .actions table td:last-child { color: #c9d1d9; }
  .link-row { margin-top: 24px; text-align: center; }
  .link-row a { color: #58a6ff; text-decoration: none; font-size: 13px; }
  .link-row a:hover { text-decoration: underline; }
  .footer { margin-top: 32px; text-align: center; font-size: 11px; color: #484f58; }
</style>
</head>
<body>
<div class="container">
  <h1>Gmail Scan Report</h1>
  <p style="color:#888; font-size:13px; margin-top:-10px;">{{VO_SUBTITLE}}</p>
  <div class="subtitle">{{TIMESTAMP}} &middot; {{MAILBOX_COUNT}} mailbox(es) &middot; {{TOTAL_MESSAGES}} messages</div>

  <!-- Repeat this card block for each mailbox -->
  {{MAILBOX_CARDS}}

  <div class="link-row">
    <a href="http://localhost:8402/digest">View Full Digest &rarr;</a>
  </div>

  <div class="footer">Generated by Virtual Office &middot; emailer agent</div>
</div>
</body>
</html>
