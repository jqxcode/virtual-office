<!DOCTYPE html>
<html lang="en">
<head>
<!-- vo-theme-0.2.0 -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gmail Scan Report -- {{TIMESTAMP}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
  :root {
    --vo-bg-deep: #0d1117; --vo-bg-panel: #010409; --vo-bg-surface: #161b22;
    --vo-bg-hover: #1c2128; --vo-bg-recessed: #0a0c10;
    --vo-text-primary: #e6edf3; --vo-text-secondary: #d0d6e0;
    --vo-text-tertiary: #8b949e; --vo-text-quaternary: #484f58;
    --vo-accent: #22c55e; --vo-accent-secondary: #10b981; --vo-accent-hover: #16a34a;
    --vo-border-subtle: rgba(255,255,255,0.05); --vo-border-standard: rgba(255,255,255,0.08);
    --vo-border-solid: #30363d; --vo-border-solid-light: #21262d;
    --vo-status-success: #22c55e; --vo-status-error: #ef4444;
    --vo-status-warning: #f59e0b; --vo-status-info: #3b82f6;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-feature-settings: "cv01", "ss03";
    background: var(--vo-bg-deep); color: var(--vo-text-secondary); line-height: 1.5;
    max-width: 720px; margin: 0 auto; padding: 32px;
  }
  h1 { color: var(--vo-text-primary); font-size: 32px; font-weight: 500; letter-spacing: -0.704px; margin-bottom: 4px; }
  .subtitle { color: var(--vo-text-tertiary); font-size: 13px; margin-bottom: 28px; }
  .card { background: var(--vo-bg-surface); border: 1px solid var(--vo-border-standard); border-radius: 8px; padding: 20px 24px; margin-bottom: 20px; }
  .card h2 { color: var(--vo-text-primary); font-size: 15px; font-weight: 600; margin-bottom: 14px; }
  .mailbox-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .mailbox-name { font-size: 15px; font-weight: 600; color: var(--vo-text-primary); }
  .mailbox-email { font-size: 12px; color: var(--vo-text-tertiary); }
  .badge { display: inline-block; font-size: 12px; font-weight: 500; padding: 2px 8px; border-radius: 9999px; }
  .badge-total { background: rgba(34,197,94,0.15); color: var(--vo-accent); }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; font-size: 11px; font-weight: 500; color: var(--vo-text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; padding: 6px 0; border-bottom: 1px solid var(--vo-border-solid); }
  td { padding: 8px 0; font-size: 14px; border-bottom: 1px solid var(--vo-border-solid-light); color: var(--vo-text-secondary); }
  td:last-child { text-align: right; font-variant-numeric: tabular-nums; }
  .cat-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; vertical-align: middle; }
  .dot-delete { background: var(--vo-status-error); }
  .dot-review { background: var(--vo-status-warning); }
  .dot-keep { background: var(--vo-status-success); }
  .dot-rollup { background: var(--vo-status-info); }
  .actions { margin-top: 16px; }
  .actions table td { color: var(--vo-text-tertiary); }
  .actions table td:last-child { color: var(--vo-text-secondary); }
  .link-row { margin-top: 24px; text-align: center; }
  .link-row a { color: var(--vo-accent); text-decoration: none; font-size: 13px; }
  .link-row a:hover { color: var(--vo-accent-hover); text-decoration: underline; }
  .footer { margin-top: 32px; padding-top: 16px; border-top: 1px solid var(--vo-border-subtle); text-align: center; color: var(--vo-text-quaternary); font-size: 12px; }
</style>
</head>
<body>
  <h1>Gmail Scan Report</h1>
  <p style="color:var(--vo-text-tertiary); font-size:13px; margin-top:-10px;">{{VO_SUBTITLE}}</p>
  <div class="subtitle">{{TIMESTAMP}} &middot; {{MAILBOX_COUNT}} mailbox(es) &middot; {{TOTAL_MESSAGES}} messages</div>

  <!-- Repeat this card block for each mailbox -->
  {{MAILBOX_CARDS}}

  <div class="link-row">
    <a href="http://localhost:8402/digest">View Full Digest &rarr;</a>
  </div>

  <div class="footer">Generated by Virtual Office &middot; emailer agent</div>
</body>
</html>
