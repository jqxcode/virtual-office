<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open PR Maintenance Report</title>
  <style>
    body { font-family: Segoe UI, Arial, sans-serif; background: #1a1a2e; color: #e0e0e0; margin: 0; padding: 24px; }
    h1 { color: #00d4ff; margin-bottom: 4px; }
    h2 { color: #00d4ff; border-bottom: 1px solid #333; padding-bottom: 6px; margin-top: 32px; }
    .card { background: #16213e; border: 1px solid #0f3460; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #0f3460; color: #00d4ff; padding: 10px 12px; text-align: left; cursor: default; }
    th[title] { text-decoration: underline dotted #00d4ff80; text-underline-offset: 3px; }
    td { padding: 9px 12px; border-bottom: 1px solid #0f3460; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1e2d55; }
    .badge-success { background: #1a5c2a; color: #4caf50; border-radius: 4px; padding: 2px 8px; font-size: 12px; font-weight: bold; }
    .badge-failed { background: #5c1a1a; color: #f44336; border-radius: 4px; padding: 2px 8px; font-size: 12px; font-weight: bold; }
    .badge-skipped { background: #3a3a1a; color: #ffb300; border-radius: 4px; padding: 2px 8px; font-size: 12px; font-weight: bold; }
    .badge-noaction { background: #1a1a3a; color: #9e9e9e; border-radius: 4px; padding: 2px 8px; font-size: 12px; font-weight: bold; }
    .badge-build-ok { background: #1a3a1a; color: #66bb6a; border-radius: 4px; padding: 2px 8px; font-size: 12px; font-weight: bold; }
    .badge-build-fail { background: #5c1a1a; color: #ef5350; border-radius: 4px; padding: 2px 8px; font-size: 12px; font-weight: bold; }
    .badge-build-running { background: #1a2a4a; color: #42a5f5; border-radius: 4px; padding: 2px 8px; font-size: 12px; font-weight: bold; }
    .badge-nudged { background: #3a2a1a; color: #ffa726; border-radius: 4px; padding: 2px 8px; font-size: 12px; font-weight: bold; }
    .badge-warning { background: #3a3a1a; color: #ffb300; font-size: 14px; cursor: default; }
    .summary-row { color: #aaa; font-size: 14px; margin-bottom: 8px; }
    .no-prs { color: #888; font-style: italic; padding: 16px 0; }
    a { color: #00d4ff; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Open PR Maintenance Report</h1>
  <p style="color:#888; font-size:13px; margin-top:-10px;">{{VO_SUBTITLE}}</p>

  <div class="card">
    <h2>Summary</h2>
    <p class="summary-row">{{SUMMARY_LINE}}</p>
    <table>
      <thead>
        <tr>
          <th title="GitHub org/repo or ADO repository name">Repo</th>
          <th title="Pull request number, linked to the PR page">PR</th>
          <th title="PR title as shown on GitHub or ADO">Title</th>
          <th title="Merge conflict status: None if clean, or count of conflicted files that were resolved">Conflicts</th>
          <th title="Unaddressed review comments. Triangle warning icon shown when comments need action.">Open Comments</th>
          <th title="ADO build status. Hover on badge for failure details. Empty for GitHub PRs.">Builds</th>
          <th title="Reviewer nudge status. Shows reason when not nudged (e.g. < 24h, Draft, Builds pending).">Nudge</th>
          <th title="Current PR state: Action Taken (agent did work), Waiting for Review, Waiting for Merge, Needs Publishing (draft), Abandoned, or Skipped.">Result</th>
        </tr>
        <!-- Rows MUST be sorted by Repo name (alphabetical), then by PR number (ascending) -->
        <!--
          PR column: must be a clickable link.
          - GitHub PRs: <a href="https://github.com/{org}/{repo}/pull/{number}">#{number}</a>
          - ADO PRs: <a href="https://domoreexp.visualstudio.com/Teamspace/_git/teams-modular-packages/pullrequest/{number}">#{number}</a>

          Builds column (ADO PRs only):
          - <span class="badge-build-ok">All Green</span>
          - <span class="badge-build-fail" title="def 14055: prettier formatting error">N Failed</span> (title attribute shows failure details on hover)
          - <span class="badge-build-running">Running</span>
          - Leave empty for GitHub PRs (no build integration yet)

          Nudge column:
          - <span class="badge-nudged">Nudged</span> if +reviewready was posted
          - <span class="badge-skipped" title="reason">Not nudged</span> with title showing why (e.g. "< 24h old", "Draft PR", "Builds not green", "Already nudged < 48h ago")

          Result column:
          - <span class="badge-success">Action Taken</span> — agent performed maintenance (prettier fix, conflict resolution, etc.)
          - <span class="badge-noaction">Waiting for Review</span> — PR needs human approval
          - <span class="badge-build-ok">Waiting for Merge</span> — all green + approved, ready to merge
          - <span class="badge-skipped">Needs Publishing</span> — draft PR
          - <span class="badge-failed">Abandoned</span> — PR abandoned (linked bug closed)
          - <span class="badge-skipped">Skipped</span> — too complex for automation
        -->
      </thead>
      <tbody>
        {{SUMMARY_TABLE_ROWS}}
      </tbody>
    </table>
    {{REPO_SUMMARIES}}
  </div>

  <div class="card">
    <h2>Details</h2>
    {{DETAILS_CONTENT}}
  </div>

  <div class="card" style="font-size:12px; color:#555; border-color:#222;">
    Generated by Bug Killer Agent | {{GENERATED_TIMESTAMP}}
  </div>
</body>
</html>
