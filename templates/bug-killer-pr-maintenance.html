<!DOCTYPE html>
<html lang="en">
<head>
<!-- vo-theme-0.2.0 -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open PR Maintenance Report</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
  :root {
    --vo-bg-deep: #0d1117; --vo-bg-panel: #010409; --vo-bg-surface: #161b22;
    --vo-bg-hover: #1c2128; --vo-bg-recessed: #0a0c10;
    --vo-text-primary: #e6edf3; --vo-text-secondary: #d0d6e0;
    --vo-text-tertiary: #8b949e; --vo-text-quaternary: #484f58;
    --vo-accent: #22c55e; --vo-accent-secondary: #10b981; --vo-accent-hover: #16a34a;
    --vo-border-subtle: rgba(255,255,255,0.05); --vo-border-standard: rgba(255,255,255,0.08);
    --vo-border-solid: #30363d; --vo-border-solid-light: #21262d;
    --vo-status-success: #22c55e; --vo-status-error: #ef4444;
    --vo-status-warning: #f59e0b; --vo-status-info: #3b82f6;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-feature-settings: "cv01", "ss03";
    background: var(--vo-bg-deep); color: var(--vo-text-secondary); line-height: 1.5;
    max-width: 1000px; margin: 0 auto; padding: 24px;
  }
  h1 { color: var(--vo-text-primary); font-size: 32px; font-weight: 500; letter-spacing: -0.704px; margin-bottom: 4px; }
  h2 { color: var(--vo-text-primary); font-size: 24px; font-weight: 500; letter-spacing: -0.288px; margin: 24px 0 12px; border-bottom: 1px solid var(--vo-border-subtle); padding-bottom: 6px; }
  .card { background: var(--vo-bg-surface); border: 1px solid var(--vo-border-standard); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
  table { width: 100%; border-collapse: collapse; margin: 16px 0; }
  th { background: var(--vo-bg-panel); color: var(--vo-text-tertiary); font-size: 13px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--vo-border-standard); }
  th[title] { text-decoration: underline dotted rgba(139,148,158,0.5); text-underline-offset: 3px; }
  td { padding: 10px 14px; font-size: 14px; border-bottom: 1px solid var(--vo-border-subtle); color: var(--vo-text-secondary); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--vo-bg-hover); }
  .badge-success { background: rgba(34,197,94,0.15); color: var(--vo-status-success); border-radius: 9999px; padding: 2px 10px; font-size: 12px; font-weight: 500; }
  .badge-failed { background: rgba(239,68,68,0.15); color: var(--vo-status-error); border-radius: 9999px; padding: 2px 10px; font-size: 12px; font-weight: 500; }
  .badge-skipped { background: rgba(245,158,11,0.15); color: var(--vo-status-warning); border-radius: 9999px; padding: 2px 10px; font-size: 12px; font-weight: 500; }
  .badge-noaction { background: rgba(139,148,158,0.15); color: var(--vo-text-tertiary); border-radius: 9999px; padding: 2px 10px; font-size: 12px; font-weight: 500; }
  .badge-build-ok { background: rgba(34,197,94,0.15); color: var(--vo-status-success); border-radius: 9999px; padding: 2px 10px; font-size: 12px; font-weight: 500; }
  .badge-build-fail { background: rgba(239,68,68,0.15); color: var(--vo-status-error); border-radius: 9999px; padding: 2px 10px; font-size: 12px; font-weight: 500; }
  .badge-build-running { background: rgba(59,130,246,0.15); color: var(--vo-status-info); border-radius: 9999px; padding: 2px 10px; font-size: 12px; font-weight: 500; }
  .badge-nudged { background: rgba(245,158,11,0.15); color: var(--vo-status-warning); border-radius: 9999px; padding: 2px 10px; font-size: 12px; font-weight: 500; }
  .badge-warning { background: rgba(245,158,11,0.15); color: var(--vo-status-warning); font-size: 14px; cursor: default; }
  .summary-row { color: var(--vo-text-tertiary); font-size: 14px; margin-bottom: 8px; }
  .no-prs { color: var(--vo-text-tertiary); font-style: italic; padding: 16px 0; }
  a { color: var(--vo-accent); text-decoration: none; }
  a:hover { color: var(--vo-accent-hover); text-decoration: underline; }
  .footer { margin-top: 32px; padding-top: 16px; border-top: 1px solid var(--vo-border-subtle); color: var(--vo-text-quaternary); font-size: 12px; }
</style>
</head>
<body>
  <h1>Open PR Maintenance Report</h1>
  <p style="color:var(--vo-text-tertiary); font-size:13px; margin-top:-10px;">{{VO_SUBTITLE}}</p>

  <div class="card">
    <h2>Summary</h2>
    <p class="summary-row">{{SUMMARY_LINE}}</p>
    <table>
      <thead>
        <tr>
          <th title="GitHub org/repo or ADO repository name">Repo</th>
          <th title="Pull request number, linked to the PR page">PR</th>
          <th title="PR title as shown on GitHub or ADO">Title</th>
          <th title="Merge conflict status: None if clean, or count of conflicted files that were resolved">Conflicts</th>
          <th title="Unaddressed review comments. Triangle warning icon shown when comments need action.">Open Comments</th>
          <th title="ADO build status. Hover on badge for failure details. Empty for GitHub PRs.">Builds</th>
          <th title="Reviewer nudge status. Shows reason when not nudged (e.g. < 24h, Draft, Builds pending).">Nudge</th>
          <th title="Current PR state: Action Taken (agent did work), Waiting for Review, Waiting for Merge, Needs Publishing (draft), Abandoned, or Skipped.">Result</th>
        </tr>
        <!-- Rows MUST be sorted by Repo name (alphabetical), then by PR number (ascending) -->
        <!--
          PR column: must be a clickable link.
          - GitHub PRs: <a href="https://github.com/{org}/{repo}/pull/{number}">#{number}</a>
          - ADO PRs: <a href="https://domoreexp.visualstudio.com/Teamspace/_git/teams-modular-packages/pullrequest/{number}">#{number}</a>

          Builds column (ADO PRs only):
          - <span class="badge-build-ok">All Green</span>
          - <span class="badge-build-fail" title="def 14055: prettier formatting error">N Failed</span> (title attribute shows failure details on hover)
          - <span class="badge-build-running">Running</span>
          - Leave empty for GitHub PRs (no build integration yet)

          Nudge column:
          - <span class="badge-nudged">Nudged</span> if +reviewready was posted
          - <span class="badge-skipped" title="reason">Not nudged</span> with title showing why (e.g. "< 24h old", "Draft PR", "Builds not green", "Already nudged < 48h ago")

          Result column:
          - <span class="badge-success">Action Taken</span> -- agent performed maintenance (prettier fix, conflict resolution, etc.)
          - <span class="badge-noaction">Waiting for Review</span> -- PR needs human approval
          - <span class="badge-build-ok">Waiting for Merge</span> -- all green + approved, ready to merge
          - <span class="badge-skipped">Needs Publishing</span> -- draft PR
          - <span class="badge-failed">Abandoned</span> -- PR abandoned (linked bug closed)
          - <span class="badge-skipped">Skipped</span> -- too complex for automation
        -->
      </thead>
      <tbody>
        {{SUMMARY_TABLE_ROWS}}
      </tbody>
    </table>
    {{REPO_SUMMARIES}}
  </div>

  <div class="card">
    <h2>Details</h2>
    {{DETAILS_CONTENT}}
  </div>

  <div class="footer">
    Generated by Bug Killer Agent | {{GENERATED_TIMESTAMP}}
  </div>
</body>
</html>
