<!-- Teams channel message template for shiproom hygiene checks 2b, 4-12 -->
<!-- NOTE: Teams messages use basic HTML only (no CSS classes, no <style> blocks) -->
<!-- RULE: Only include sections that have items. Omit sections with 0 items entirely. -->
<!-- If ALL sections are empty, do NOT post at all. -->

<!-- INLINE @MENTIONS: Owner column in every table row must be an @mention, not plain text.
     How to build:
     1. Before building HTML, collect ALL unique owner emails across all checks
     2. Resolve each via Graph API: GET /v1.0/users/{email}?$select=displayName,id
     3. Assign incrementing mention IDs (0, 1, 2...)
     4. In table rows, render Owner as: <at id="{N}">{displayName}</at>
     5. Build the mentions JSON array with all resolved owners
     6. Same person appearing in multiple rows reuses the same mention ID
     7. Josh Xu (90b98fe6-a80b-46e1-9209-b5ebcdf6da6b) is always included even if not an owner
-->
