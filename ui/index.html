<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Virtual Office</title>
  <link rel="stylesheet" href="styles.css?v=13">
</head>
<body>
  <header class="header">
    <div class="header-left">
      <h1 class="header-title">Agent Virtual Office</h1>
    </div>
    <div class="header-right">
      <span id="connection-indicator" class="connection-indicator connected">
        <span class="connection-dot"></span>
        <span id="connection-text">Connected</span>
      </span>
      <span id="last-updated" class="last-updated">--</span>
    </div>
  </header>

  <!-- Top-level navigation tabs -->
  <nav class="top-tabs" id="top-tabs">
    <button class="top-tab active" data-tab="team">ABOUT US</button>
    <button class="top-tab" data-tab="office">OFFICE</button>
    <button class="top-tab" data-tab="history">HISTORY</button>
    <button class="top-tab" data-tab="schedule">SCHEDULE</button>
  </nav>

  <main class="main-content">
    <!-- Keep hidden compat elements for tests/JS that reference them -->
    <div id="agent-grid" class="agent-grid" style="display:none"></div>
    <div id="activity-feed" style="display:none"></div>
    <div id="event-log-full" style="display:none"></div>

    <!-- About Us View (formerly TEAM) -->
    <section id="view-team" class="view active">
      <div class="team-overview" id="team-overview"></div>
      <div id="team-agent-list" class="team-agent-list"></div>
    </section>

    <!-- Office View (V2) -->
    <section id="view-office" class="view" style="display:none">
      <div class="office-header" id="office-header">
        <div class="office-title">VIRTUAL OFFICE</div>
        <div class="office-clock" id="office-clock">--</div>
      </div>
      <div id="office-floor" class="office-floor"></div>
      <div class="section-header" style="margin-top:1.5rem">
        <span>Queue</span>
        <span class="section-badge" id="office-queue-badge">0</span>
      </div>
      <div id="office-queue" class="office-queue"></div>
      <div class="section-header" style="margin-top:1.5rem">
        <span>Live Feed</span>
      </div>
      <div id="office-feed" class="office-feed"></div>
    </section>

    <!-- History View (V2) -->
    <section id="view-history" class="view" style="display:none">
      <!-- Job Health Summary Cards -->
      <div class="section-header">
        <span>Job Health (7 days)</span>
      </div>
      <div id="history-health-cards" class="history-health-cards"></div>

      <!-- Run History Table -->
      <div class="section-header" style="margin-top:1.5rem">
        <span>Run History</span>
        <span class="section-badge" id="history-count">--</span>
      </div>
      <div id="history-filter-bar" class="v2-filter-bar">
        <select id="history-agent-filter" class="v2-filter-select">
          <option value="">All Agents</option>
        </select>
        <select id="history-job-filter" class="v2-filter-select">
          <option value="">All Jobs</option>
        </select>
        <select id="history-result-filter" class="v2-filter-select">
          <option value="">All Results</option>
          <option value="success">Success</option>
          <option value="failure">Failed</option>
          <option value="timeout">Timeout</option>
        </select>
        <select id="history-time-filter" class="v2-filter-select">
          <option value="" selected>All Time</option>
          <option value="24h">Last 24 Hours</option>
          <option value="7d">Last 7 Days</option>
          <option value="30d">Last 30 Days</option>
        </select>
      </div>
      <div id="history-table-wrapper">
        <table class="history-table" id="history-table">
          <thead>
            <tr>
              <th data-sort="agent">Agent</th>
              <th data-sort="job">Job</th>
              <th data-sort="start">Start</th>
              <th data-sort="duration">Duration</th>
              <th data-sort="result">Result</th>
              <th>Report</th>
            </tr>
          </thead>
          <tbody id="history-tbody"></tbody>
        </table>
      </div>
      <div id="history-show-more" class="v2-show-more-bar" style="display:none">
        <button class="v2-show-more-btn" id="history-more-btn">Show more</button>
      </div>
    </section>

    <!-- Schedule View (V2) -->
    <section id="view-schedule" class="view" style="display:none">
      <div class="section-header">
        <span>Upcoming Schedule</span>
        <span class="section-badge" id="schedule-v2-count">--</span>
      </div>
      <div id="schedule-v2-filter-bar" class="v2-filter-bar">
        <select id="schedule-v2-agent-filter" class="v2-filter-select">
          <option value="">All Agents</option>
        </select>
      </div>
      <div class="schedule-table-wrapper">
        <table class="schedule-table">
          <thead>
            <tr>
              <th>Next Run</th>
              <th>Agent</th>
              <th>Job</th>
              <th>Schedule</th>
              <th>Last Result</th>
            </tr>
          </thead>
          <tbody id="schedule-v2-tbody"></tbody>
        </table>
      </div>
      <div id="schedule-v2-show-more" class="v2-show-more-bar" style="display:none">
        <button class="v2-show-more-btn" id="schedule-v2-more-btn">Show more</button>
      </div>
    </section>
  </main>

  <script src="app.js?v=13"></script>
</body>
</html>
