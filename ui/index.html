<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtual Office</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <div class="header-left">
      <h1 class="header-title">Virtual Office</h1>
    </div>
    <div class="header-right">
      <span id="connection-indicator" class="connection-indicator connected">
        <span class="connection-dot"></span>
        <span id="connection-text">Connected</span>
      </span>
      <span id="last-updated" class="last-updated">--</span>
    </div>
  </header>

  <main class="main-content">
    <section class="agents-section">
      <div class="agent-tabs" id="agent-tabs">
        <!-- Tabs rendered by JS from config groups -->
      </div>
      <h2 class="section-title" id="agent-section-title">Agents</h2>
      <div id="agent-grid" class="agent-grid">
        <div class="placeholder-message">Loading agents...</div>
      </div>
    </section>

    <section class="events-section">
      <h2 class="section-title">Event Log</h2>
      <div id="event-log" class="event-log">
        <div class="placeholder-message">Waiting for events...</div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
